<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Card</title>
    <!-- Google Font-->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="outside">
        <div class="front">
          <p>Happy Birthday</p>
          <div class="cake">
            <div class="top-layer"></div>
            <div class="middle-layer"></div>
            <div class="bottom-layer"></div>
            <div class="candle"></div>
          </div>
        </div>
        <div class="back"></div>
      </div>
      <div class="inside">
        <p>Gefeliciteerd met je verjaardag Chelsea!!! Klik op het cadeautje voor een verrassing🥳  </p>
        <a class="present-link" href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" rel="noopener noreferrer" aria-label="Open birthday video" title="Watch your birthday surprise">
          <img class="present-img" src="https://img.icons8.com/color/144/000000/gift.png" alt="Birthday present" />
        </a>
      </div>
    </div>

    <script>
      const card = document.querySelector('.card');
      const confettiColors = ['#ff4a4a', '#ffcc00', '#4ad4ff', '#42ff7a', '#ff75ff', '#ffa07a'];
      const container = document.body;

      function launchConfetti() {
        const count = 100;
        for (let i = 0; i < count; i += 1) {
          const piece = document.createElement('div');
          piece.className = 'confetti-piece';
          const size = Math.floor(Math.random() * 8 + 6);
          piece.style.width = `${size}px`;
          piece.style.height = `${size}px`;
          piece.style.backgroundColor = confettiColors[Math.floor(Math.random() * confettiColors.length)];
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.top = `${Math.random() * 20}%`;
          piece.style.transform = `rotate(${Math.random() * 360}deg)`;
          piece.style.setProperty('--delta-x', `${Math.random() * 1000 - 500}px`);
          piece.style.setProperty('--delta-y', `${500 + Math.random() * 500}px`);
          piece.style.animationDuration = `${1.6 + Math.random() * 1.4}s`;
          piece.style.animationDelay = `${Math.random() * 0.2}s`;

          container.appendChild(piece);

          setTimeout(() => {
            piece.remove();
          }, 3500);
        }
      }

      card.addEventListener('mouseenter', () => launchConfetti());
    </script>
  </body>
</html>
